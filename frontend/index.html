<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus Blog - Articles sur le cloud et la tech</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="logo">☁️ Nimbus Blog</a>
                <ul class="nav-links">
                    <li><a href="/">Accueil</a></li>
                    <li><a href="/articles.html">Articles</a></li>
                    <li id="admin-link" style="display: none;"><a href="/admin/dashboard.html">Admin</a></li>
                    <li id="auth-link"><a href="/login.html">Connexion</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Bienvenue sur Nimbus Blog</h1>
                <p>Un blog moderne, scalable et hébergé sur AWS</p>
                <a href="/articles.html" class="btn">Lire les articles →</a>
            </div>
        </section>

        <section class="articles-section">
            <div class="container">
                <h2>Derniers articles</h2>
                <div id="latest-articles" class="articles-grid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Chargement des articles...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Nimbus Blog - Propulsé par AWS et Laravel</p>
        </div>
    </footer>

    <script type="module">
        import { fetchArticles } from './js/api.js';
        import { formatDate, truncateText } from './js/utils.js';
        import { updateHeaderAuth, isAdmin } from './js/auth.js';
        
        // Mettre à jour le header selon l'authentification
        updateHeaderAuth();
        
        async function loadLatestArticles() {
            const container = document.getElementById('latest-articles');
            const result = await fetchArticles(1, 3);
            
            if (!result.success || result.data.length === 0) {
                container.innerHTML = '<p style="text-align:center;">Aucun article pour le moment.</p>';
                return;
            }
            
            container.innerHTML = result.data.map(article => `
                <article class="article-card">
                    ${article.image_url ? `<img src="${article.image_url}" alt="${article.title}">` : ''}
                    <h3>${article.title}</h3>
                    <div class="meta">Publié le ${formatDate(article.published_at)}</div>
                    <p class="excerpt">${truncateText(article.excerpt || article.content.replace(/<[^>]*>/g, ''), 120)}</p>
                    <a href="/article.html?id=${article.id}" class="read-more">Lire l'article →</a>
                </article>
            `).join('');
        }
        
        loadLatestArticles();
        
        // Afficher le lien admin si connecté
        if (isAdmin()) {
            document.getElementById('admin-link').style.display = 'inline-block';
        }
    </script>
</body>
</html>
