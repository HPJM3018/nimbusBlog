<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus Blog </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="logo">☁️ Nimbus Blog</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/articles.html">Articles</a></li>
                    <li id="admin-link" style="display: none;"><a href="/admin/dashboard.html">Admin</a></li>
                    <li id="auth-link"><a href="/login.html">Connexion</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Welcome - Nimbus Blog</h1>
                <p>A modern, scalable blog hosted on AWS</p>
                <a href="/articles.html" class="btn">Read articles →</a>
            </div>
        </section>

        <section class="articles-section">
            <div class="container">
                <h2>Last articles</h2>
                <div id="latest-articles" class="articles-grid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading articles...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Nimbus Blog - Epadox Program</p>
        </div>
    </footer>

        <script>
        const API_URL = 'http://localhost:8000/api';
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }
        
        async function loadLatestArticles() {
            const container = document.getElementById('latest-articles');
            
            try {
                const response = await fetch(`${API_URL}/articles`);
                const data = await response.json();
                
                if (!data.success || data.data.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">Aucun article pour le moment.</p>';
                    return;
                }
                
                const latestArticles = data.data.slice(0, 3);
                container.innerHTML = latestArticles.map(article => `
                    <article class="article-card">
                        ${article.image_url ? `<img src="${article.image_url}" alt="${article.title}">` : ''}
                        <h3>${article.title}</h3>
                        <div class="meta">Publié le ${formatDate(article.published_at)}</div>
                        <p class="excerpt">${article.excerpt || article.content.replace(/<[^>]*>/g, '').substring(0, 100)}</p>
                        <a href="article.html?id=${article.id}" class="read-more">Lire l'article →</a>
                    </article>
                `).join('');
                
            } catch (error) {
                console.error('Erreur:', error);
                container.innerHTML = '<p style="text-align:center;">Erreur de chargement</p>';
            }
        }
        
        const token = localStorage.getItem('adminToken');
        if (token) {
            document.getElementById('admin-link').style.display = 'inline-block';
            const authLink = document.getElementById('auth-link');
            authLink.textContent = 'Déconnexion';
            authLink.href = '#';
            authLink.onclick = () => {
                localStorage.removeItem('adminToken');
                window.location.reload();
            };
        }
        
        loadLatestArticles();
    </script>
</body>
</html>
