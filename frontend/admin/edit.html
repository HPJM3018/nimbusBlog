<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditer l'article - Nimbus Blog Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="logo">☁️ Nimbus Blog - Admin</a>
                <ul class="nav-links">
                    <li><a href="/">Voir le site</a></li>
                    <li><a href="/admin/dashboard.html">Dashboard</a></li>
                    <li><a href="#" id="logout-btn">Déconnexion</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="form-container" style="max-width: 800px;">
                <h1 id="form-title">Nouvel article</h1>
                
                <form id="article-form">
                    <div class="form-group">
                        <label for="title">Titre *</label>
                        <input type="text" id="title" name="title" required placeholder="Titre de l'article">
                    </div>
                    
                    <div class="form-group">
                        <label for="image_url">Image URL</label>
                        <input type="url" id="image_url" name="image_url" placeholder="https://example.com/image.jpg">
                        <small style="color:#666;">Laissez vide si pas d'image</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="excerpt">Extrait (optionnel)</label>
                        <textarea id="excerpt" name="excerpt" rows="3" placeholder="Court résumé de l'article..."></textarea>
                        <small style="color:#666;">Laissez vide pour générer automatiquement</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="content">Contenu *</label>
                        <textarea id="content" name="content" rows="12" required placeholder="Contenu de l'article en HTML..."></textarea>
                        <small style="color:#666;">Vous pouvez utiliser du HTML (balises p, strong, em, ul, li, etc.)</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="tags">Tags (séparés par des virgules)</label>
                        <input type="text" id="tags" name="tags" placeholder="cloud, aws, laravel, php">
                    </div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="btn">Publier</button>
                        <a href="/admin/dashboard.html" class="btn btn-outline">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Nimbus Blog - Administration</p>
        </div>
    </footer>

    <script type="module">
        import { fetchArticleById, createArticle, updateArticle } from '../js/api.js';
        import { getArticleIdFromUrl, showNotification, requireAuth } from '../js/utils.js';
        
        // Vérifier l'authentification
        if (!requireAuth()) {
            window.location.href = '/login.html';
        }
        
        // Configurer la déconnexion
        import { setupLogoutButton } from '../js/auth.js';
        setupLogoutButton();
        
        const form = document.getElementById('article-form');
        const formTitle = document.getElementById('form-title');
        let articleId = null;
        
        // Vérifier si on est en mode édition
        const urlId = getArticleIdFromUrl();
        if (urlId) {
            articleId = urlId;
            formTitle.textContent = 'Modifier l\'article';
            loadArticle(articleId);
        }
        
        async function loadArticle(id) {
            try {
                const result = await fetchArticleById(id);
                
                if (result.success && result.data) {
                    const article = result.data;
                    document.getElementById('title').value = article.title || '';
                    document.getElementById('image_url').value = article.image_url || '';
                    document.getElementById('excerpt').value = article.excerpt || '';
                    document.getElementById('content').value = article.content || '';
                    document.getElementById('tags').value = (article.tags || []).join(', ');
                } else {
                    showNotification('Article non trouvé', 'error');
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1500);
                }
            } catch (error) {
                console.error('Erreur chargement article:', error);
                showNotification('Erreur lors du chargement', 'error');
            }
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Récupérer les valeurs
            const title = document.getElementById('title').value.trim();
            const image_url = document.getElementById('image_url').value.trim();
            const excerpt = document.getElementById('excerpt').value.trim();
            const content = document.getElementById('content').value.trim();
            const tagsInput = document.getElementById('tags').value.trim();
            
            // Validation
            if (!title) {
                showNotification('Le titre est requis', 'error');
                return;
            }
            
            if (!content) {
                showNotification('Le contenu est requis', 'error');
                return;
            }
            
            // Traiter les tags
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];
            
            const articleData = {
                title,
                content,
                excerpt: excerpt || null,
                image_url: image_url || null,
                tags
            };
            
            try {
                let result;
                
                if (articleId) {
                    // Mode édition
                    result = await updateArticle(articleId, articleData);
                } else {
                    // Mode création
                    result = await createArticle(articleData);
                }
                
                if (result.success) {
                    showNotification(articleId ? 'Article modifié avec succès' : 'Article créé avec succès', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1500);
                } else {
                    showNotification(result.message || 'Erreur lors de l\'enregistrement', 'error');
                }
            } catch (error) {
                console.error('Erreur soumission:', error);
                showNotification('Erreur réseau', 'error');
            }
        });
    </script>
</body>
</html>
