<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Article - Nimbus Blog Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="logo">☁️ Nimbus Blog - Admin</a>
                <ul class="nav-links">
                    <li><a href="/">View Site</a></li>
                    <li><a href="/admin/dashboard.html">Dashboard</a></li>
                    <li><a href="#" id="logout-btn">Logout</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="form-container" style="max-width: 800px;">
                <h1 id="form-title">New Article</h1>
                
                <form id="article-form">
                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" name="title" required placeholder="Article title">
                    </div>
                    
                    <div class="form-group">
                        <label for="image_url">Image URL</label>
                        <input type="url" id="image_url" name="image_url" placeholder="https://example.com/image.jpg">
                        <small style="color:#666;">Leave empty if no image</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="excerpt">Excerpt (optional)</label>
                        <textarea id="excerpt" name="excerpt" rows="3" placeholder="Short summary of the article..."></textarea>
                        <small style="color:#666;">Leave empty to generate automatically</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="content">Content *</label>
                        <textarea id="content" name="content" rows="12" required placeholder="Article content in HTML..."></textarea>
                        <small style="color:#666;">You can use HTML (p, strong, em, ul, li, etc.)</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="tags">Tags (comma separated)</label>
                        <input type="text" id="tags" name="tags" placeholder="cloud, aws, laravel, php">
                    </div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="btn">Publish</button>
                        <a href="/admin/dashboard.html" class="btn btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Nimbus Blog - Administration</p>
        </div>
    </footer>

    <script type="module">
        import { fetchArticleById, createArticle, updateArticle } from '../js/api.js';
        import { getArticleIdFromUrl, showNotification, requireAuth } from '../js/utils.js';
        
        // Check authentication
        if (!requireAuth()) {
            window.location.href = '/login.html';
        }
        
        // Setup logout button
        import { setupLogoutButton } from '../js/auth.js';
        setupLogoutButton();
        
        const form = document.getElementById('article-form');
        const formTitle = document.getElementById('form-title');
        let articleId = null;
        
        // Check if editing mode
        const urlId = getArticleIdFromUrl();
        if (urlId) {
            articleId = urlId;
            formTitle.textContent = 'Edit Article';
            loadArticle(articleId);
        }
        
        async function loadArticle(id) {
            try {
                const result = await fetchArticleById(id);
                
                if (result.success && result.data) {
                    const article = result.data;
                    document.getElementById('title').value = article.title || '';
                    document.getElementById('image_url').value = article.image_url || '';
                    document.getElementById('excerpt').value = article.excerpt || '';
                    document.getElementById('content').value = article.content || '';
                    document.getElementById('tags').value = (article.tags || []).join(', ');
                } else {
                    showNotification('Article not found', 'error');
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1500);
                }
            } catch (error) {
                console.error('Error loading article:', error);
                showNotification('Error loading article', 'error');
            }
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get values
            const title = document.getElementById('title').value.trim();
            const image_url = document.getElementById('image_url').value.trim();
            const excerpt = document.getElementById('excerpt').value.trim();
            const content = document.getElementById('content').value.trim();
            const tagsInput = document.getElementById('tags').value.trim();
            
            // Validation
            if (!title) {
                showNotification('Title is required', 'error');
                return;
            }
            
            if (!content) {
                showNotification('Content is required', 'error');
                return;
            }
            
            // Process tags
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];
            
            const articleData = {
                title,
                content,
                excerpt: excerpt || null,
                image_url: image_url || null,
                tags
            };
            
            try {
                let result;
                
                if (articleId) {
                    // Edit mode
                    result = await updateArticle(articleId, articleData);
                } else {
                    // Create mode
                    result = await createArticle(articleData);
                }
                
                if (result.success) {
                    showNotification(articleId ? 'Article updated successfully' : 'Article created successfully', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1500);
                } else {
                    showNotification(result.message || 'Error saving article', 'error');
                }
            } catch (error) {
                console.error('Submit error:', error);
                showNotification('Network error', 'error');
            }
        });
    </script>
</body>
</html>
