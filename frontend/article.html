<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - Nimbus Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="logo">☁️ Nimbus Blog</a>
                <ul class="nav-links">
                    <li><a href="/">Accueil</a></li>
                    <li><a href="/articles.html">Articles</a></li>
                    <li id="admin-link" style="display: none;"><a href="/admin/dashboard.html">Admin</a></li>
                    <li id="auth-link"><a href="/login.html">Connexion</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div id="article-content" class="article-detail">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Chargement de l'article...</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Nimbus Blog - Propulsé par AWS et Laravel</p>
        </div>
    </footer>

    <script type="module">
        import { fetchArticleById } from './js/api.js';
        import { formatDate, getArticleIdFromUrl } from './js/utils.js';
        import { updateHeaderAuth, isAdmin } from './js/auth.js';
        
        updateHeaderAuth();
        
        async function loadArticle() {
            const id = getArticleIdFromUrl();
            const container = document.getElementById('article-content');
            
            if (!id) {
                container.innerHTML = '<p style="text-align:center;">Article non trouvé</p>';
                return;
            }
            
            const result = await fetchArticleById(id);
            
            if (!result.success || !result.data) {
                container.innerHTML = '<p style="text-align:center;">Article non trouvé</p>';
                return;
            }
            
            const article = result.data;
            document.title = `${article.title} - Nimbus Blog`;
            
            container.innerHTML = `
                <h1>${article.title}</h1>
                <div class="article-meta">
                    Publié le ${formatDate(article.published_at)} par ${article.author || 'Admin'}
                </div>
                ${article.image_url ? `<img src="${article.image_url}" alt="${article.title}" style="max-width:100%; border-radius:12px; margin-bottom:2rem;">` : ''}
                <div class="article-content">
                    ${article.content}
                </div>
                <div style="margin-top: 2rem;">
                    <a href="/articles.html" class="btn btn-outline">← Retour aux articles</a>
                </div>
            `;
        }
        
        loadArticle();
        
        if (isAdmin()) {
            document.getElementById('admin-link').style.display = 'inline-block';
        }
    </script>
</body>
</html>
