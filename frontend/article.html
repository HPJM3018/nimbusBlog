<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - Nimbus Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="index.html" class="logo">☁️ Nimbus Blog</a>
                <ul class="nav-links">
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="articles.html">Articles</a></li>
                    <li id="admin-link" style="display: none;"><a href="admin/dashboard.html">Admin</a></li>
                    <li id="auth-link"><a href="login.html">Connexion</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div id="article-content" class="article-detail">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Chargement de l'article...</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Nimbus Blog - Propulsé par AWS</p>
        </div>
    </footer>

    <script>
        // Configuration
        const API_URL = 'http://localhost:8000/api';
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }
        
        // Récupérer l'ID dans l'URL
        function getArticleId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }
        
        async function loadArticle() {
            const id = getArticleId();
            const container = document.getElementById('article-content');
            
            if (!id) {
                container.innerHTML = '<p style="text-align:center;">Article non trouvé</p>';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/articles/${id}`);
                const data = await response.json();
                
                if (!data.success || !data.data) {
                    container.innerHTML = '<p style="text-align:center;">Article non trouvé</p>';
                    return;
                }
                
                const article = data.data;
                document.title = `${article.title} - Nimbus Blog`;
                
                container.innerHTML = `
                    <h1>${article.title}</h1>
                    <div class="article-meta">
                        Publié le ${formatDate(article.published_at)} par ${article.author || 'Admin'}
                    </div>
                    ${article.image_url ? `<img src="${article.image_url}" alt="${article.title}" style="max-width:100%; border-radius:12px; margin-bottom:2rem;">` : ''}
                    <div class="article-content">
                        ${article.content}
                    </div>
                    <div style="margin-top: 2rem;">
                        <a href="articles.html" class="btn btn-outline">← Retour aux articles</a>
                    </div>
                `;
                
            } catch (error) {
                console.error('Erreur:', error);
                container.innerHTML = '<p style="text-align:center; color:red;">Erreur de chargement de l\'article</p>';
            }
        }
        
        // Vérifier si admin est connecté
        const token = localStorage.getItem('adminToken');
        if (token) {
            document.getElementById('admin-link').style.display = 'inline-block';
            const authLink = document.getElementById('auth-link');
            authLink.textContent = 'Déconnexion';
            authLink.href = '#';
            authLink.onclick = () => {
                localStorage.removeItem('adminToken');
                window.location.reload();
            };
        }
        
        // Charger l'article
        loadArticle();
    </script>
</body>
</html>
