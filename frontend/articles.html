<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tous les articles - Nimbus Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="index.html" class="logo">☁️ Nimbus Blog</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="articles.html">Articles</a></li>
                    <li id="admin-link" style="display: none;"><a href="admin/dashboard.html">Admin</a></li>
                    <li id="auth-link"><a href="login.html">Connexion</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="articles-section">
            <div class="container">
                <h2>All articles</h2>
                <div id="articles-list" class="articles-grid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading articles...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Nimbus Blog </p>
        </div>
    </footer>

    <script>
        // Configuration
        const API_URL = 'http://localhost:8000/api';
        
        // Fonctions
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }
        
        async function loadArticles() {
            const container = document.getElementById('articles-list');
            
            try {
                const response = await fetch(`${API_URL}/articles`);
                const data = await response.json();
                
                if (!data.success || data.data.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">Aucun article pour le moment.</p>';
                    return;
                }
                
                container.innerHTML = data.data.map(article => `
                    <article class="article-card">
                        ${article.image_url ? `<img src="${article.image_url}" alt="${article.title}">` : ''}
                        <h3>${article.title}</h3>
                        <div class="meta">Publié le ${formatDate(article.published_at)}</div>
                        <p class="excerpt">${article.excerpt || article.content.replace(/<[^>]*>/g, '').substring(0, 100)}</p>
                        <a href="article.html?id=${article.id}" class="read-more">Lire l'article →</a>
                    </article>
                `).join('');
                
            } catch (error) {
                console.error('Erreur:', error);
                container.innerHTML = '<p style="text-align:center; color:red;">Erreur de chargement des articles</p>';
            }
        }
        
        // Vérifier si admin est connecté
        const token = localStorage.getItem('adminToken');
        if (token) {
            document.getElementById('admin-link').style.display = 'inline-block';
            const authLink = document.getElementById('auth-link');
            authLink.textContent = 'Déconnexion';
            authLink.href = '#';
            authLink.onclick = () => {
                localStorage.removeItem('adminToken');
                window.location.reload();
            };
        }
        
        // Charger les articles
        loadArticles();
    </script>
</body>
</html>
